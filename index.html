<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RW Insumos — Sistema Agronômico</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f1eb;--bg2:#edeae2;--surface:#fff;--border:#d8d4c8;--border2:#c8c3b5;
  --text:#1a1a18;--text2:#5a5a52;--text3:#9a9a90;
  --green:#2d6a4f;--green-l:#e8f5ee;--green-m:#52b788;
  --amber:#b5580a;--amber-l:#fef3e2;
  --red:#9b2226;--red-l:#fdecea;
  --blue:#1d4e89;--blue-l:#e8f0fb;
  --purple:#5c3d8f;--purple-l:#f0eafa;
  --accent:#2d6a4f;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
.hdr{background:var(--text);color:#fff;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hdr-logo{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.08em}
.hdr-logo span{color:#52b788}
.hdr-right{display:flex;align-items:center;gap:.75rem}
.api-wrap{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.08);border-radius:6px;padding:.3rem .6rem}
.api-wrap label{font-size:11px;color:rgba(255,255,255,.5);font-family:var(--mono);white-space:nowrap}
.api-wrap input{background:transparent;border:none;outline:none;font-family:var(--mono);font-size:12px;color:#fff;width:200px}
.api-toggle{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-size:11px;padding:2px 5px;border-radius:3px;font-family:var(--mono)}
.api-toggle:hover{color:#fff}

/* NAV MODULES */
.mod-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem}
.mod-btn{padding:.75rem 1.25rem;font-size:13px;font-weight:500;border:none;background:transparent;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;font-family:var(--sans);transition:all .15s;display:flex;align-items:center;gap:.4rem}
.mod-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.mod-btn:hover:not(.active){color:var(--text)}
.mod-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.6}

/* LAYOUT */
.layout{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 96px)}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:1.25rem;overflow-y:auto;max-height:calc(100vh - 96px);position:sticky;top:96px}
.main{padding:1.75rem;overflow-y:auto}

/* FORM */
.sec-lbl{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.12em;color:var(--text3);text-transform:uppercase;margin-bottom:.6rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:.65rem}
.fg label{font-size:11px;color:var(--text2);font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:.45rem .65rem;border:1px solid var(--border);border-radius:6px;font-family:var(--sans);font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border .15s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg textarea{font-family:var(--mono);font-size:11px;resize:vertical;min-height:50px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.5rem}

/* BUTTONS */
.btn-primary{width:100%;padding:.7rem;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:opacity .15s;margin-top:.5rem}
.btn-primary:hover{opacity:.87}
.btn-primary:disabled{opacity:.35;cursor:not-allowed}
.btn-sec{padding:.45rem .9rem;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-sec:hover{border-color:var(--accent);color:var(--accent)}
.btn-upload{width:100%;padding:.65rem;background:transparent;color:var(--text2);border:1.5px dashed var(--border2);border-radius:7px;font-size:13px;cursor:pointer;font-family:var(--sans);transition:all .15s;margin-bottom:.75rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-upload:hover{border-color:var(--accent);color:var(--accent);background:var(--green-l)}

/* CARDS */
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.rcard-title{font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;margin-bottom:1rem}

/* TABLES */
.ptable{width:100%;border-collapse:collapse}
.ptable th{font-size:10px;font-weight:500;color:var(--text3);text-align:left;padding:.4rem .5rem;border-bottom:1px solid var(--border);font-family:var(--mono);letter-spacing:.05em}
.ptable td{padding:.5rem .5rem;border-bottom:1px solid var(--bg2);font-size:12px;vertical-align:top}
.ptable tr:last-child td{border-bottom:none}
.ptable tr:hover td{background:var(--bg2)}

/* BADGES */
.bdg{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;font-family:var(--mono);letter-spacing:.03em;white-space:nowrap}
.bdg-baixo{background:var(--blue-l);color:var(--blue)}
.bdg-medio{background:var(--amber-l);color:var(--amber)}
.bdg-adequado{background:var(--green-l);color:var(--green)}
.bdg-alto{background:#fff3cd;color:#856404}
.bdg-excesso{background:var(--red-l);color:var(--red)}
.bdg-deficiente{background:var(--red-l);color:var(--red)}
.bdg-normal{background:var(--green-l);color:var(--green)}
.bdg-excessivo{background:var(--purple-l);color:var(--purple)}

/* DRIS BARS */
.dris-bar-wrap{display:flex;align-items:center;gap:.5rem;margin-top:2px}
.dris-bar-bg{flex:1;height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;position:relative}
.dris-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.dris-val{font-family:var(--mono);font-size:11px;min-width:45px;text-align:right}

/* OBS */
.obs{padding:.6rem .85rem;border-radius:6px;font-size:12px;margin-bottom:.4rem;line-height:1.5;border-left:3px solid}
.obs-c{background:var(--red-l);border-color:var(--red);color:var(--red)}
.obs-a{background:var(--amber-l);border-color:var(--amber);color:var(--amber)}
.obs-o{background:var(--green-l);border-color:var(--green-m);color:var(--green)}

/* EMPTY / LOAD */
.empty{text-align:center;padding:4rem 2rem;color:var(--text3)}
.empty svg{width:48px;height:48px;margin:0 auto 1rem;opacity:.25;display:block}
.empty p{font-size:13px;line-height:1.8}
.spin-wrap{text-align:center;padding:3rem}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto .75rem}
@keyframes spin{to{transform:rotate(360deg)}}

/* CAL TABLE */
.ctbl{width:100%;border-collapse:collapse}
.ctbl td{padding:.5rem .5rem;border-bottom:1px solid var(--bg2);font-size:12px}
.ctbl td:first-child{color:var(--text2);width:55%}
.ctbl td:last-child{font-weight:600;font-family:var(--mono);text-align:right}
.ctbl tr:last-child td{border-bottom:none}
.cal-note{background:var(--green-l);border-left:3px solid var(--green-m);border-radius:0 6px 6px 0;padding:.65rem .9rem;font-size:12px;color:var(--green);margin-top:.65rem;line-height:1.6}

/* ADUB */
.adub-item{padding:.6rem 0;border-bottom:1px solid var(--bg2)}
.adub-item:last-child{border-bottom:none}
.adub-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.15rem}
.adub-el{font-family:var(--mono);font-weight:600;font-size:13px}
.adub-dose{font-family:var(--mono);font-size:11px;color:var(--text2)}
.adub-det{font-size:11px;color:var(--text3);line-height:1.4}

/* NOTA */
.nota{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:.6rem .9rem;font-size:10px;color:var(--text3);margin-top:.75rem;font-family:var(--mono);line-height:1.7}

/* UPLOAD STATUS */
.upload-status{font-size:11px;color:var(--green);font-family:var(--mono);padding:.35rem .65rem;background:var(--green-l);border-radius:5px;margin-bottom:.65rem;display:none}

/* PRINT */
@media print{.hdr,.mod-nav,.sidebar,.btn-primary,.btn-sec{display:none}.main{padding:0}.rcard{border:1px solid #ccc;page-break-inside:avoid}}

/* RESPONSIVE */
@media(max-width:800px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:static;max-height:none;border-right:none;border-bottom:1px solid var(--border)}
  .g4{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">RW <span>///</span> INSUMOS &nbsp;<span style="opacity:.3">|</span>&nbsp; <span style="font-weight:300;font-size:12px;opacity:.6">Sistema Agronômico</span></div>
  <div class="hdr-right">
    <div class="api-wrap">
      <label>API</label>
      <input type="password" id="apikey" placeholder="sk-ant-••••••••••••" autocomplete="off">
      <button class="api-toggle" onclick="toggleKey()">ver</button>
    </div>
    <button class="btn-sec" onclick="window.print()" style="color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.2)">Imprimir</button>
  </div>
</div>

<!-- MODULE NAV -->
<div class="mod-nav">
  <button class="mod-btn active" onclick="setMod('solo')" id="mod-solo"><div class="mod-dot"></div>Análise de Solo</button>
  <button class="mod-btn" onclick="setMod('foliar')" id="mod-foliar"><div class="mod-dot"></div>Análise Foliar</button>
  <button class="mod-btn" onclick="setMod('dris')" id="mod-dris"><div class="mod-dot"></div>DRIS</button>
</div>

<!-- LAYOUT -->
<div class="layout">
<div class="sidebar" id="sidebar-content"></div>
<div class="main" id="main-content">
  <div class="empty" id="empty-state">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    <p>Selecione um módulo acima,<br>preencha os dados e clique em <strong>Interpretar</strong><br>para gerar o laudo agronômico.</p>
  </div>
</div>
</div>

<script>
// ============================================================
// UTILS
// ============================================================
function toggleKey(){const i=document.getElementById('apikey');const b=i.nextElementSibling;i.type=i.type==='password'?'text':'password';b.textContent=i.type==='password'?'ver':'ocultar'}
function g(id){const el=document.getElementById(id);return el?el.value.trim():''}
function apiKey(){return document.getElementById('apikey').value.trim()}
function showLoading(){document.getElementById('main-content').innerHTML='<div class="spin-wrap"><div class="spinner"></div><p style="font-size:13px;color:var(--text2)">Interpretando com base na literatura agronômica...</p></div>'}
function setMain(html){document.getElementById('main-content').innerHTML=html}
function fmtDate(){return new Date().toLocaleDateString('pt-BR')}

// ============================================================
// MODULE NAVIGATION
// ============================================================
let currentMod = 'solo';
function setMod(m){
  currentMod=m;
  document.querySelectorAll('.mod-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('mod-'+m).classList.add('active');
  renderSidebar(m);
  setMain('<div class="empty" id="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg><p>Preencha os dados e clique em <strong>Interpretar</strong>.</p></div>');
}

// ============================================================
// SIDEBAR RENDER
// ============================================================
function renderSidebar(m){
  const cultura_opts = ['Cana-de-açúcar','Soja','Milho','Café','Tomate','Batata','Feijão','Citros','Pastagem','Hortaliças folhosas','Mandioca'];
  const co = cultura_opts.map(c=>`<option>${c}</option>`).join('');
  const textura_opts = `<option value="argiloso">Argiloso (>35%)</option><option value="médio">Médio (15–35%)</option><option value="arenoso">Arenoso (<15%)</option>`;

  if(m==='solo'){
    document.getElementById('sidebar-content').innerHTML=`
<div class="sec-lbl">Upload PDF</div>
<button class="btn-upload" onclick="document.getElementById('pdf-input').click()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  Carregar PDF do laboratório
</button>
<input type="file" id="pdf-input" accept=".pdf" style="display:none" onchange="handlePDF(this)">
<div class="upload-status" id="upload-status"></div>

<div class="sec-lbl">Identificação</div>
<div class="fg"><label>Propriedade</label><input type="text" id="prop" placeholder="Ex: Sítio São João"></div>
<div class="fg"><label>Quadra / Amostra</label><input type="text" id="quad" placeholder="Ex: Quadra Cima"></div>
<div class="g2">
  <div class="fg"><label>Cultura</label><select id="cultura"><option value="">Selecione...</option>${co}</select></div>
  <div class="fg"><label>Área (ha)</label><input type="number" id="area" value="1" min="0.1" step="0.1"></div>
</div>
<div class="fg"><label>Textura</label><select id="textura">${textura_opts}</select></div>

<div class="sec-lbl" style="margin-top:.75rem">Reação do solo</div>
<div class="g3">
  <div class="fg"><label>pH CaCl₂</label><input type="number" id="ph" step="0.1" placeholder="4.3"></div>
  <div class="fg"><label>pH SMP</label><input type="number" id="phsmp" step="0.1" placeholder="5.7"></div>
  <div class="fg"><label>V%</label><input type="number" id="v" step="0.1" placeholder="30"></div>
</div>
<div class="g3">
  <div class="fg"><label>Al (mmolc)</label><input type="number" id="al" step="0.1" placeholder="5"></div>
  <div class="fg"><label>Ac.Total</label><input type="number" id="actt" step="0.1" placeholder="56"></div>
  <div class="fg"><label>Sat.Al%</label><input type="number" id="satal" step="0.1" placeholder="16.9"></div>
</div>

<div class="sec-lbl" style="margin-top:.75rem">Macronutrientes</div>
<div class="g3">
  <div class="fg"><label>Ca (mmolc)</label><input type="number" id="ca" step="0.1" placeholder="15"></div>
  <div class="fg"><label>Mg (mmolc)</label><input type="number" id="mg" step="0.1" placeholder="7"></div>
  <div class="fg"><label>K (mmolc)</label><input type="number" id="k" step="0.1" placeholder="2.4"></div>
</div>
<div class="g3">
  <div class="fg"><label>CTC</label><input type="number" id="ctc" step="0.1" placeholder="80.5"></div>
  <div class="fg"><label>SB</label><input type="number" id="sb" step="0.1" placeholder="24.5"></div>
  <div class="fg"><label>P (mg/dm³)</label><input type="number" id="p" step="0.1" placeholder="15"></div>
</div>
<div class="g2">
  <div class="fg"><label>MO (g/dm³)</label><input type="number" id="mo" step="0.1" placeholder="24"></div>
  <div class="fg"><label>S (mg/dm³)</label><input type="number" id="s" step="0.1" placeholder="32"></div>
</div>

<div class="sec-lbl" style="margin-top:.75rem">Micronutrientes (mg/dm³)</div>
<div class="g3">
  <div class="fg"><label>Zn</label><input type="number" id="zn" step="0.1" placeholder="1.5"></div>
  <div class="fg"><label>B</label><input type="number" id="b" step="0.1" placeholder="0.7"></div>
  <div class="fg"><label>Cu</label><input type="number" id="cu" step="0.1" placeholder="2.6"></div>
</div>
<div class="g2">
  <div class="fg"><label>Mn</label><input type="number" id="mn" step="0.1" placeholder="5.4"></div>
  <div class="fg"><label>Fe</label><input type="number" id="fe" step="0.1" placeholder="40"></div>
</div>
<button class="btn-primary" onclick="interpretarSolo()" id="btn-solo">Interpretar análise de solo</button>`;
  }

  else if(m==='foliar'){
    document.getElementById('sidebar-content').innerHTML=`
<div class="sec-lbl">Upload PDF</div>
<button class="btn-upload" onclick="document.getElementById('pdf-foliar').click()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  Carregar PDF foliar
</button>
<input type="file" id="pdf-foliar" accept=".pdf" style="display:none" onchange="handlePDFFoliar(this)">
<div class="upload-status" id="upload-status-foliar"></div>

<div class="sec-lbl">Identificação</div>
<div class="fg"><label>Propriedade</label><input type="text" id="f-prop" placeholder="Ex: Sítio São João"></div>
<div class="fg"><label>Talhão / Amostra</label><input type="text" id="f-talh" placeholder="Ex: Talhão 3"></div>
<div class="g2">
  <div class="fg"><label>Cultura</label><select id="f-cultura"><option value="">Selecione...</option>${co}</select></div>
  <div class="fg"><label>Estádio</label><input type="text" id="f-estadio" placeholder="Ex: V6, R1, floração"></div>
</div>

<div class="sec-lbl" style="margin-top:.75rem">Macronutrientes (g/kg)</div>
<div class="g3">
  <div class="fg"><label>N</label><input type="number" id="f-n" step="0.1" placeholder="30"></div>
  <div class="fg"><label>P</label><input type="number" id="f-p" step="0.1" placeholder="2.5"></div>
  <div class="fg"><label>K</label><input type="number" id="f-k" step="0.1" placeholder="20"></div>
</div>
<div class="g3">
  <div class="fg"><label>Ca</label><input type="number" id="f-ca" step="0.1" placeholder="10"></div>
  <div class="fg"><label>Mg</label><input type="number" id="f-mg" step="0.1" placeholder="3"></div>
  <div class="fg"><label>S</label><input type="number" id="f-s" step="0.1" placeholder="2"></div>
</div>

<div class="sec-lbl" style="margin-top:.75rem">Micronutrientes (mg/kg)</div>
<div class="g3">
  <div class="fg"><label>B</label><input type="number" id="f-b" step="0.1" placeholder="30"></div>
  <div class="fg"><label>Cu</label><input type="number" id="f-cu" step="0.1" placeholder="10"></div>
  <div class="fg"><label>Fe</label><input type="number" id="f-fe" step="0.1" placeholder="100"></div>
</div>
<div class="g3">
  <div class="fg"><label>Mn</label><input type="number" id="f-mn" step="0.1" placeholder="50"></div>
  <div class="fg"><label>Zn</label><input type="number" id="f-zn" step="0.1" placeholder="20"></div>
  <div class="fg"><label>Mo</label><input type="number" id="f-mo" step="0.01" placeholder="0.5"></div>
</div>
<button class="btn-primary" onclick="interpretarFoliar()" id="btn-foliar">Interpretar análise foliar</button>`;
  }

  else if(m==='dris'){
    document.getElementById('sidebar-content').innerHTML=`
<div class="sec-lbl">Upload PDF</div>
<button class="btn-upload" onclick="document.getElementById('pdf-dris').click()">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
  Carregar PDF foliar para DRIS
</button>
<input type="file" id="pdf-dris" accept=".pdf" style="display:none" onchange="handlePDFDris(this)">
<div class="upload-status" id="upload-status-dris"></div>

<div class="sec-lbl">Identificação</div>
<div class="fg"><label>Propriedade</label><input type="text" id="d-prop" placeholder="Ex: Fazenda Boa Vista"></div>
<div class="fg"><label>Talhão / Amostra</label><input type="text" id="d-talh" placeholder="Ex: Quadra 2"></div>
<div class="g2">
  <div class="fg"><label>Cultura</label><select id="d-cultura"><option value="">Selecione...</option>${co}</select></div>
  <div class="fg"><label>Produtividade esperada</label><select id="d-prod"><option value="média">Média</option><option value="alta">Alta</option><option value="muito alta">Muito alta</option></select></div>
</div>

<div class="sec-lbl" style="margin-top:.75rem">Teores foliares (g/kg, exceto micro mg/kg)</div>

// ============================================================
// PDF HANDLING — envia como base64 para Claude extrair
// ============================================================
async function pdfToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

async function handlePDF(input){
  const file=input.files[0]; if(!file) return;
  const key=apiKey();
  if(!key){alert('Insira sua chave API primeiro.');return;}
  const st=document.getElementById('upload-status');
  st.style.display='block'; st.textContent='Lendo PDF...';
  try{
    const b64=await pdfToBase64(file);
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-client-side-allow-unsafe':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',max_tokens:800,
        system:'Extraia dados de análise de solo deste relatório de laboratório. Retorne SOMENTE JSON válido sem markdown.',
        messages:[{role:'user',content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},
          {type:'text',text:'Extraia todos os valores desta análise de solo. Retorne JSON: {"prop":"nome da propriedade","quad":"identificação da quadra/amostra","ph":0,"phsmp":0,"v":0,"al":0,"actt":0,"satal":0,"ca":0,"mg":0,"k":0,"ctc":0,"sb":0,"p":0,"mo":0,"s":0,"zn":0,"b":0,"cu":0,"mn":0,"fe":0}. Use null para valores não encontrados.'}
        ]}]
      })
    });
    const data=await resp.json();
    if(data.error){st.textContent='Erro: '+data.error.message;return;}
    const raw=data.content[0].text.replace(/```json|```/g,'').trim();
    const vals=JSON.parse(raw);
    preencherSolo(vals);
    st.textContent='✓ PDF lido — '+file.name;
  }catch(e){st.textContent='Erro ao ler PDF: '+e.message;}
}

function preencherSolo(v){
  const map={prop:'prop',quad:'quad',ph:'ph',phsmp:'phsmp',v:'v',al:'al',actt:'actt',satal:'satal',ca:'ca',mg:'mg',k:'k',ctc:'ctc',sb:'sb',p:'p',mo:'mo',s:'s',zn:'zn',b:'b',cu:'cu',mn:'mn',fe:'fe'};

function renderDRIS(res,prop,talh,cultura){
  const statusColor={deficiente:'var(--red)','levemente deficiente':'var(--amber)',equilibrado:'var(--green)','levemente excessivo':'#856404',excessivo:'var(--purple)'};
  const maxAbs=Math.max(...res.indices.map(i=>Math.abs(i.indice)),1);

  const barsHTML=res.indices.sort((a,b)=>a.indice-b.indice).map(i=>{
    const abs=Math.abs(i.indice); const pct=Math.min(abs/maxAbs*100,100);
    const cor=statusColor[i.status]||'var(--text2)';
    const lado=i.indice<0?'deficiência':'excesso';
    return `<div style="margin-bottom:.6rem">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">
        <span style="font-weight:500">${i.nutriente} <span style="font-size:10px;color:var(--text3)">ordem ${i.ordem_limitacao||'—'}</span></span>
        <span style="font-family:var(--mono);font-size:11px;color:${cor}">${i.indice>0?'+':''}${Number(i.indice).toFixed(1)} · ${i.status}</span>
      </div>
      <div class="dris-bar-bg">
        <div class="dris-bar-fill" style="width:${pct}%;background:${cor};margin-left:${i.indice>=0?'50%':'calc(50% - '+pct/2+'%)'}"></div>
      </div>
    </div>`;
  }).join('');

  const ibnColor=res.ibn<10?'var(--green)':res.ibn<20?'var(--amber)':'var(--red)';

  setMain(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.5rem">
      <div>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono)">${fmtDate()} · DRIS — Diagnosis and Recommendation Integrated System</div>
        <div style="font-size:17px;font-weight:600">${prop} — ${talh} · ${cultura}</div>
      </div>
      <button class="btn-sec" onclick="window.print()">Imprimir / PDF</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
      <div class="rcard" style="text-align:center">
        <div class="rcard-title">IBN — Índice de Balanço Nutricional</div>
        <div style="font-size:36px;font-weight:600;font-family:var(--mono);color:${ibnColor}">${Number(res.ibn).toFixed(1)}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:.25rem">${res.classificacao_ibn}</div>
      </div>
      <div class="rcard">
        <div class="rcard-title">Ordem de limitação</div>
        ${res.ordem_limitacao_deficiencia&&res.ordem_limitacao_deficiencia.length?`<div style="font-size:11px;color:var(--text3);margin-bottom:.3rem">Deficiência (mais → menos limitante)</div><div style="font-family:var(--mono);font-size:13px;color:var(--red);margin-bottom:.75rem">${res.ordem_limitacao_deficiencia.join(' › ')}</div>`:''}
        ${res.ordem_limitacao_excesso&&res.ordem_limitacao_excesso.length?`<div style="font-size:11px;color:var(--text3);margin-bottom:.3rem">Excesso</div><div style="font-family:var(--mono);font-size:13px;color:var(--purple)">${res.ordem_limitacao_excesso.join(' › ')}</div>`:''}
      </div>
    </div>

    <div class="rcard">
      <div class="rcard-title">Índices DRIS por nutriente</div>
      ${barsHTML}
      <div style="font-size:10px;color:var(--text3);margin-top:.5rem;font-family:var(--mono)">Linha central = zero (equilíbrio) · Esquerda = deficiência · Direita = excesso</div>
    </div>

    ${res.recomendacoes&&res.recomendacoes.length?`<div class="rcard"><div class="rcard-title">Recomendações de correção</div>${res.recomendacoes.map(r=>`<div class="adub-item"><div class="adub-hdr"><span class="adub-el">${r.nutriente}</span><span class="adub-dose">${r.dose_sugerida||''}</span></div><div class="adub-det">${r.acao}${r.produto?' · Produto: '+r.produto:''}</div></div>`).join('')}</div>`:''}

    <div class="rcard"><div class="rcard-title">Observações</div>${res.observacoes.map(o=>`<div class="obs ${o.nivel==='critico'?'obs-c':o.nivel==='alerta'?'obs-a':'obs-o'}">${o.texto}</div>`).join('')}</div>
    <div class="nota">DRIS calculado com base nas normas de Beaufils (1973) adaptadas por Malavolta et al. e literatura IAC/Embrapa para ${cultura}. Os índices são relativos — validar com agrônomo responsável. RW Insumos · ${fmtDate()}</div>`);
}

// ============================================================
// API CALL
// ============================================================
function callAPI(prompt, onSuccess, onError){
  const key=apiKey();
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-client-side-allow-unsafe':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:'Responda APENAS com JSON válido. Sem markdown, sem texto fora do JSON, sem vírgula final.',messages:[{role:'user',content:prompt}]})
  })
  .then(r=>r.json())
  .then(data=>{
    if(data.error){setMain(`<div class="empty"><p>Erro API: ${data.error.message}</p></div>`);if(onError)onError();return;}
    onSuccess(data);
  })
  .catch(e=>{
    setMain(`<div class="empty"><p>Erro de conexão: ${e.message}<br><br>Verifique sua chave API e a conexão com a internet.</p></div>`);
    if(onError)onError();
  });
}

renderSidebar('solo');
</script>
